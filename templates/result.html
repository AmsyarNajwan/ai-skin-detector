<!DOCTYPE html>
<html>

<head>

    <title>Skin Analysis Result</title>

    <link rel="stylesheet" href="static\css\style.css">

</head>

<body>

    <div class="glass-card">

        <h1 class="title">Skin Analysis</h1>

        <img src="{{image_path}}">

        <div class="result">
            {{skin_type}}
        </div>

        <p class="confidence">
            Confidence: {{confidence}}%
        </p>

        <br>

        <p class="subtitle">
            {{recommendation}}
        </p>

        <br>

        <a href="/">
            <button>
                Scan Another Image
            </button>
        </a>

    </div>

</body>

</html>
